<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CAD Components | Engineering Portfolio</title>
    <meta name="description" content="Professional CAD components including 3D models, engineering drawings, and mechanical visualizations.">

    <link rel="icon" href="Assets/brand/favicon.ico">

    <!-- CSS -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="components.css">

    <!-- Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header id="header-container"></header>

    <main id="main-content" class="container">

        <section class="page-header">
            <h1>CAD Components</h1>
            <p>Browse and explore professional engineering components.</p>
        </section>

        <!-- Error State -->
        <div id="error-state" class="error-state" hidden>
            <div class="error-icon">⚠️</div>
            <h3>Failed to load components</h3>
            <p>Please check your connection and try again.</p>
            <button onclick="location.reload()" class="retry-btn">Retry</button>
        </div>

        <!-- Components Grid -->
        <section id="components-grid" class="items-grid"></section>

    </main>

    <footer id="footer-container"></footer>

    <!-- =========================
         DETAIL MODAL
    ========================== -->

    <div id="detail-modal" class="detail-modal" aria-hidden="true">

        <div class="detail-modal-content" id="detail-modal-content">

            <!-- CLOSE BUTTON -->
            <button class="modal-close" id="modal-close-btn">&times;</button>

            <!-- TITLE -->
            <h2 class="detail-title" id="detail-title"></h2>

            <!-- COLORED ACTION BUTTONS -->
            <div class="action-buttons" id="action-buttons"></div>

            <!-- MEDIA VIEWER SECTION -->
            <div class="viewer-section">
                <div class="media-grid" id="preview-container"></div>
            </div>

            <!-- TOOLBAR -->
            <div class="media-toolbar" id="media-toolbar"></div>

        </div>

    </div>

    <!-- =========================
         SCRIPTS
    ========================== -->

    <script src="load-partials.js" defer></script>
    <script src="data.js" defer></script>
    <script src="components.js" defer></script>

</body>
</html>
