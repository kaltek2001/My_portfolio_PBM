<!-- Minimal JavaScript for dynamic year and back-to-top visibility (now with debounce and no duplication) -->
<script>
    (function() {
        'use strict';

        // Set current year once
        const yearSpan = document.getElementById('current-year');
        if (yearSpan) yearSpan.textContent = new Date().getFullYear();

        // Back-to-top button visibility and smooth scroll
        const backToTop = document.querySelector('.back-to-top');
        if (!backToTop) return;

        // Use a named function to avoid duplicate listeners
        function updateBackToTopVisibility() {
            if (window.scrollY > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        }

        // Debounce function to limit scroll event calls
        function debounce(func, wait) {
            let timeout;
            return function() {
                clearTimeout(timeout);
                timeout = setTimeout(func, wait);
            };
        }

        // Attach scroll listener with debounce (and ensure it's only added once)
        if (!window._backToTopListenerAdded) {
            const debouncedUpdate = debounce(updateBackToTopVisibility, 100);
            window.addEventListener('scroll', debouncedUpdate, { passive: true });
            window._backToTopListenerAdded = true; // flag to prevent duplicate
            // Also call once to set initial state
            updateBackToTopVisibility();
        }

        // Click handler for smooth scroll
        backToTop.addEventListener('click', function(e) {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    })();
</script>
