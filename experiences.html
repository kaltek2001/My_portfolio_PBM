<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Experience | Mechanical Engineer</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Global & Page CSS -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="experiences.css">
</head>
<body>
    <!-- Header loaded dynamically -->
    <div id="header-container"></div>

    <main class="main-content">
        <!-- Hero Section with Engineering Background -->
        <section class="experience-hero">
            <div class="hero-overlay"></div>
            <div class="container hero-content">
                <h1><i class="fas fa-briefcase"></i> Professional Experience</h1>
                <p>Mechanical Engineering Technician & Designer</p>
                <a href="#timeline" class="hero-cta">View my career <i class="fas fa-arrow-down"></i></a>
            </div>
        </section>

        <!-- Career Summary Section -->
        <section class="career-summary">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-chart-line"></i> Career Snapshot</h2>
                <div class="summary-cards">
                    <div class="summary-card">
                        <span class="summary-icon"><i class="fas fa-calendar-alt"></i></span>
                        <div>
                            <h3>Total Experience</h3>
                            <p class="summary-value" id="total-exp">3+ years</p>
                        </div>
                    </div>
                    <div class="summary-card">
                        <span class="summary-icon"><i class="fas fa-industry"></i></span>
                        <div>
                            <h3>Industries</h3>
                            <p class="summary-value">Manufacturing, Design, Education</p>
                        </div>
                    </div>
                    <div class="summary-card">
                        <span class="summary-icon"><i class="fas fa-tools"></i></span>
                        <div>
                            <h3>Key Tools</h3>
                            <p class="summary-value">CNC, AutoCAD, G‑Code, SolidWorks</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Timeline Container (populated by JS) -->
        <div class="timeline-container" id="timeline"></div>
    </main>

    <!-- Footer loaded dynamically -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="load-partials.js"></script>
    <script src="experiences.js"></script>
</body>
</html>
